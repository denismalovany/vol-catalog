<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VOL — Деталь</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%232297b2'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='system-ui' font-size='18' font-weight='600' fill='%23fff'%3EV%3C/text%3E%3C/svg%3E" />
  <style>
    :root {
      --primary: #2297b2;
      --primary-hover: #1559ed;
      --text: #333333;
      --heading: #000000;
      --border: #e1e8ed;
      --surface-soft: #fafbfc;
      --surface-muted: #f2f5f7;
      --surface-dark: #282c29;
      --white: #ffffff;
      --font-base: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --font-mono: ui-monospace, 'JetBrains Mono', SFMono-Regular, Menlo, monospace;
      --r-sm: 4px;
      --r-md: 10px;
      --r-lg: 15px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    .skip-link {
      position: absolute; left: -9999px; top: 0;
      background: var(--heading); color: var(--white);
      padding: 12px 18px; font: 600 14px/1 var(--font-base);
      z-index: 100;
    }
    .skip-link:focus-visible { left: 12px; top: 12px; outline: 2px solid var(--primary); outline-offset: 2px; }
    html, body {
      background: var(--surface-soft);
      color: var(--text);
      font: 16px/1.65 var(--font-base);
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--link, #000); text-decoration: none; }
    a:hover { color: var(--primary); }
    h1, h2, h3 { color: var(--heading); font-weight: 600; letter-spacing: 0; }
    h1 { font-size: clamp(26px, 3vw, 35px); line-height: 1.4; }
    h2 { font-size: 20px; line-height: 1.4; margin-bottom: 16px; }
    h3 { font-size: 16px; margin-bottom: 8px; }

    .container { max-width: 1290px; margin: 0 auto; padding: 0 24px; }
    .narrow { max-width: 750px; }

    .site-header {
      background: var(--surface-soft);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 50;
    }
    .site-header__inner { display: flex; align-items: center; justify-content: space-between; padding: 18px 0; gap: 24px; }
    .logo { display: inline-flex; align-items: center; gap: 10px; }
    .logo__mark { width: 32px; height: 32px; background: var(--primary); color: var(--white); display: grid; place-items: center; font-weight: 600; font-size: 18px; border-radius: var(--r-sm); }
    .logo__text { font-weight: 600; font-size: 15px; color: var(--heading); letter-spacing: 0.06em; text-transform: uppercase; }
    .logo__text small { display: block; font-size: 11px; font-weight: 400; color: var(--text); text-transform: none; letter-spacing: 0; }
    .nav { display: flex; align-items: center; gap: 24px; }
    .nav a { font-size: 15px; color: var(--text); text-transform: uppercase; letter-spacing: 0.06em; padding: 5px 0; }
    .btn { display: inline-flex; align-items: center; gap: 8px; background: var(--primary); color: var(--white); border: 0; border-radius: var(--r-md); padding: 0 30px; min-height: 50px; font: 600 16px/1.3 var(--font-base); cursor: pointer; text-decoration: none; }
    .btn:hover { background: var(--primary-hover); color: var(--white); }
    .btn:focus-visible { outline: 2px solid var(--primary-hover); outline-offset: 2px; }
    .btn--ghost { background: transparent; color: var(--heading); border: 1px solid var(--border); }
    .btn--ghost:hover { background: var(--surface-muted); color: var(--heading); }
    .btn--ghost:focus-visible { outline: 2px solid var(--primary-hover); outline-offset: 2px; border-color: var(--primary-hover); }

    /* Breadcrumbs */
    .crumbs { padding: 24px 0 0; font-size: 14px; color: var(--text); }
    .crumbs a { color: var(--text); }
    .crumbs a:hover { color: var(--primary); }
    .crumbs a:focus-visible { outline: 2px solid var(--primary-hover); outline-offset: 2px; }
    .crumbs span { margin: 0 8px; color: var(--border); }

    /* Layout */
    .detail { padding: 32px 0 80px; }
    .detail__grid {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
      gap: 48px;
    }
    .render-frame {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      overflow: hidden;
      position: sticky; top: 100px;
    }
    .render-frame svg { display: block; width: 100%; height: auto; }

    /* Галерея */
    .gallery { display: flex; flex-direction: column; gap: 8px; }
    .gallery__main {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      overflow: hidden;
      position: relative;
      aspect-ratio: 4 / 3;
      cursor: zoom-in;
    }
    .gallery__main img {
      display: block; width: 100%; height: 100%;
      object-fit: contain; object-position: center;
      background: var(--white);
    }
    .gallery__main svg { display: block; width: 100%; height: 100%; }
    .gallery__main img:not([src]) { display: none; }
    .gallery__counter {
      position: absolute; right: 12px; bottom: 12px;
      background: rgba(0, 0, 0, 0.72); color: #fff;
      font: 500 12px/1 var(--font-mono);
      letter-spacing: 0.06em;
      padding: 6px 10px; border-radius: var(--r-sm);
      pointer-events: none;
    }
    .gallery__nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 40px; height: 40px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--border);
      border-radius: 50%;
      color: var(--heading);
      font-size: 20px; line-height: 1;
      cursor: pointer; display: grid; place-items: center;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }
    .gallery__nav:hover { background: var(--white); border-color: var(--primary); color: var(--primary); }
    .gallery__nav:focus-visible { outline: 2px solid var(--primary-hover); outline-offset: 2px; }
    .gallery__nav--prev { left: 12px; }
    .gallery__nav--next { right: 12px; }
    .gallery__nav[disabled] { opacity: 0.3; cursor: default; }
    .gallery__nav[disabled]:hover { background: rgba(255,255,255,0.92); border-color: var(--border); color: var(--heading); }
    .gallery__thumbs {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
      gap: 8px;
    }
    .gallery__thumb {
      aspect-ratio: 4 / 3;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      background: var(--white);
      padding: 0;
      cursor: pointer;
      overflow: hidden;
      transition: border-color 0.12s;
    }
    .gallery__thumb img { display: block; width: 100%; height: 100%; object-fit: cover; }
    .gallery__thumb svg { display: block; width: 100%; height: 100%; }
    .gallery__thumb:hover { border-color: var(--primary); }
    .gallery__thumb:focus-visible { outline: 2px solid var(--primary-hover); outline-offset: 2px; }
    .gallery__thumb[aria-current="true"] { border-color: var(--primary); border-width: 2px; }

    /* Lightbox */
    .lightbox {
      position: fixed; inset: 0;
      background: rgba(10, 14, 26, 0.92);
      display: none;
      align-items: center; justify-content: center;
      z-index: 1000;
      padding: 32px;
    }
    .lightbox[aria-hidden="false"] { display: flex; }
    .lightbox__img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .lightbox__close, .lightbox__prev, .lightbox__next {
      position: absolute; background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff; border-radius: 50%;
      width: 48px; height: 48px;
      font-size: 22px; line-height: 1; cursor: pointer;
      display: grid; place-items: center;
      transition: background 0.12s, border-color 0.12s;
    }
    .lightbox__close:hover, .lightbox__prev:hover, .lightbox__next:hover {
      background: rgba(255, 255, 255, 0.2); border-color: rgba(255, 255, 255, 0.4);
    }
    .lightbox__close:focus-visible, .lightbox__prev:focus-visible, .lightbox__next:focus-visible {
      outline: 2px solid var(--primary); outline-offset: 2px;
    }
    .lightbox__close { top: 24px; right: 24px; }
    .lightbox__prev { left: 24px; top: 50%; transform: translateY(-50%); }
    .lightbox__next { right: 24px; top: 50%; transform: translateY(-50%); }
    .lightbox__counter {
      position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.8);
      font: 500 13px/1 var(--font-mono);
      letter-spacing: 0.1em;
    }

    .meta-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 12px; font: 500 11px/1 var(--font-mono); letter-spacing: 0.08em; text-transform: uppercase; color: var(--text); }
    .meta-row .sku { color: var(--text); }
    .meta-row .tag { background: var(--surface-muted); color: var(--heading); padding: 4px 10px; border-radius: var(--r-sm); }

    .lede { color: var(--text); margin-bottom: 28px; }

    .block { padding: 20px 0; border-top: 1px solid var(--border); }
    .block:first-of-type { border-top: 0; padding-top: 0; }
    .block dl { display: grid; grid-template-columns: 160px 1fr; gap: 6px 16px; font-size: 14px; }
    .block dt { color: var(--text); font-weight: 400; }
    .block dd { color: var(--heading); font-weight: 500; }
    .block dd code { font: 500 13px/1.3 var(--font-mono); background: var(--surface-muted); padding: 2px 6px; border-radius: var(--r-sm); }

    /* (compat-list rules removed — field deprecated) */

    .spec-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
    .spec-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 12px 14px; }
    .spec-card .lbl { font: 500 11px/1 var(--font-mono); letter-spacing: 0.08em; text-transform: uppercase; color: var(--text); }
    .spec-card .val { font: 600 15px/1.3 var(--font-base); color: var(--heading); margin-top: 6px; }

    .actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 24px; }

    /* Сусідні деталі */
    .related { margin-top: 64px; padding-top: 32px; border-top: 1px solid var(--border); }
    .related__grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; margin-top: 16px; }
    .related__card { background: var(--white); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 12px; font-size: 14px; }
    .related__card a { color: var(--heading); font-weight: 600; display: block; margin-bottom: 4px; }
    .related__card .sku { font: 500 11px/1 var(--font-mono); color: var(--text); letter-spacing: 0.08em; text-transform: uppercase; }

    @media (max-width: 820px) {
      .detail__grid { grid-template-columns: 1fr; }
      .render-frame, .gallery { position: static; }
      .gallery__nav { width: 36px; height: 36px; font-size: 18px; }
      .block dl { grid-template-columns: 1fr; gap: 2px 0; }
      .block dt { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 8px; }
      .nav { display: none; }
    }
    @media print {
      .site-header, .crumbs, .actions, .related, .skip-link, .gallery__nav, .lightbox { display: none; }
      body { background: #fff; color: #000; font-size: 12px; }
      .render-frame, .gallery__main { position: static; border: 1px solid #000; break-inside: avoid; }
      .detail { padding: 0; }
      .block { break-inside: avoid; }
      a { color: #000; }
    }
  </style>
</head>
<body>

  <a class="skip-link" href="#m-name">Перейти до деталі</a>
  <header class="site-header">
    <div class="container site-header__inner">
      <a href="./" class="logo">
        <span class="logo__mark">V</span>
        <span class="logo__text">VOL<small>волонтерська оптична лабораторія</small></span>
      </a>
      <nav class="nav">
        <a href="./#catalog">Каталог</a>
        <a href="./#about">Про каталог</a>
      </nav>
      <a class="btn" href="https://vol.com.ua/donat/" target="_blank" rel="noopener">Підтримати фонд</a>
    </div>
  </header>

  <div class="container">
    <nav class="crumbs" aria-label="Навігація">
      <a href="./">Каталог</a>
      <span aria-hidden="true">›</span>
      <a id="crumb-device" href="./">—</a>
      <span aria-hidden="true">›</span>
      <span id="crumb-name">—</span>
    </nav>
  </div>

  <main class="detail">
    <div class="container">
      <div class="detail__grid">
        <div>
          <div class="gallery" id="gallery" aria-label="Галерея зображень"></div>
        </div>
        <div>
          <div class="meta-row">
            <span class="sku" id="m-sku">—</span>
            <span class="tag" id="m-type">—</span>
          </div>
          <h1 id="m-name">—</h1>
          <p class="lede" id="m-lede">—</p>

          <section class="block">
            <h2>Параметри друку</h2>
            <div class="spec-grid" id="m-print"></div>
          </section>

          <section class="block">
            <h2>Матеріал</h2>
            <dl>
              <dt>Рекомендований</dt><dd id="m-material">—</dd>
            </dl>
          </section>

          <section class="block">
            <h2>Нотатки інженера</h2>
            <p id="m-notes" style="font-size: 15px;">—</p>
          </section>

          <div class="actions">
            <a class="btn btn--ghost" href="./">← Повернутись до каталогу</a>
          </div>
        </div>
      </div>

      <section class="related" id="related-wrap" hidden>
        <h2>Схожі деталі</h2>
        <div class="related__grid" id="related"></div>
      </section>
    </div>
  </main>

  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Зображення на повний екран" aria-hidden="true">
    <button type="button" class="lightbox__close" id="lb-close" aria-label="Закрити">×</button>
    <button type="button" class="lightbox__prev" id="lb-prev" aria-label="Попереднє фото">‹</button>
    <img class="lightbox__img" id="lb-img" alt="">
    <button type="button" class="lightbox__next" id="lb-next" aria-label="Наступне фото">›</button>
    <div class="lightbox__counter" id="lb-counter" aria-live="polite">1 / 1</div>
  </div>

  <script src="./js/render.js"></script>
  <script src="./js/parts-data.js"></script>
  <script src="./js/part.js"></script>
</body>
</html>
