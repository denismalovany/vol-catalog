<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VOL — Сторінку не знайдено</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%232297b2'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='system-ui' font-size='18' font-weight='600' fill='%23fff'%3EV%3C/text%3E%3C/svg%3E" />
  <style>
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #fafbfc;
      color: #333;
      font: 18px/1.65 -apple-system, BlinkMacSystemFont, "Segoe UI", Montserrat, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .site-header {
      background: #fff;
      border-bottom: 1px solid #e1e8ed;
    }
    .site-header__inner {
      max-width: 1290px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 40px;
      height: 80px;
    }
    .logo img { height: 40px; display: block; }
    .main {
      flex: 1;
      display: grid;
      place-items: center;
      padding: 60px 24px;
    }
    .card {
      max-width: 560px;
      text-align: center;
    }
    .eyebrow {
      display: inline-block;
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #2297b2;
      font-weight: 600;
      margin-bottom: 16px;
    }
    h1 {
      font-weight: 600;
      font-size: 56px;
      line-height: 1.1;
      color: #000;
      margin-bottom: 16px;
    }
    p { color: #333; margin-bottom: 32px; }
    .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      min-height: 50px; padding: 0 24px;
      background: #2297b2; color: #fff;
      font: 600 16px/1.3 -apple-system, BlinkMacSystemFont, Montserrat, system-ui, sans-serif;
      text-decoration: none; border: 0; border-radius: 6px;
      transition: background 120ms ease-out;
    }
    .btn:hover { background: #1559ed; }
    .btn--ghost {
      background: transparent;
      color: #000;
      border: 1px solid #e1e8ed;
    }
    .btn--ghost:hover { background: #f2f5f7; }
    .btn:focus-visible {
      outline: 2px solid #2297b2;
      outline-offset: 2px;
    }
    .footer {
      background: #282c29;
      color: #fff;
      padding: 32px 24px;
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a href="./" class="logo"><img src="logo.svg" alt="VOL"></a>
    </div>
  </header>

  <main class="main">
    <div class="card">
      <span class="eyebrow">Помилка 404</span>
      <h1>Сторінку не знайдено</h1>
      <p>Можливо, посилання застаріло або сторінку було переміщено. Поверніться до каталогу, щоб знайти потрібну деталь.</p>
      <div class="actions">
        <a class="btn" href="./">До каталогу</a>
        <a class="btn btn--ghost" href="https://vol.com.ua/" target="_blank" rel="noopener">На головний сайт ВОЛ</a>
      </div>
    </div>
  </main>

  <footer class="footer">
    © 2026 БО БФ «Волонтерська Оптична Лабораторія»
  </footer>
</body>
</html>
